# A solution is a collection of related projects
solution:
  created-for: CMSIS-Toolbox@2.12.0
  cdefault:

  # List of tested compilers
  select-compiler:
    - compiler: AC6

  # Miscellaneous toolchain controls
  misc:
    - for-compiler: AC6
      C-CPP:
        - -gdwarf-5
      ASM:
        - -gdwarf-5

  # List the packs that define the device and/or board
  packs:
    - pack: Keil::STM32F7xx_DFP@^3.0.0-0
    - pack: Keil::STM32F746G-DISCO_BSP@^1.0.0-0
    - pack: ARM::CMSIS-Driver_STM32@^1.0.0-0
    - pack: ARM::CMSIS@^6.0.0
    - pack: ARM::CMSIS-RTX@^5.9.0
    - pack: ARM::CMSIS-Compiler@^2.0.0
    - pack: ARM::CMSIS-DSP@1.16.2
    - pack: ARM::CMSIS-NN@7.0.0
    - pack: ARM::ethos-u-core-driver@1.25.2
    - pack: Keil::STM32F746G-DISCO_BSP@1.1.1
    - pack: Keil::STM32F7xx_DFP@3.1.1
    - pack: tensorflow::kissfft@1.25.2
    - pack: tensorflow::ruy@1.25.2
    - pack: tensorflow::tensorflow-lite-micro@1.25.2
    - pack: tensorflow::flatbuffers@1.25.2
    - pack: tensorflow::gemmlowp@1.25.2

  # List different hardware targets
  target-types:
    - type: STM32F746G-DISCO
      board: STMicroelectronics::STM32F746G-DISCO
      device: STMicroelectronics::STM32F746NGHx
      target-set:
        - set:
          images:
            - project-context: Blinky.Debug

  # List of different build configurations
  build-types:
    - type: Debug
      debug: on
      optimize: debug

    - type: Release
      debug: off
      optimize: balanced

  # List related projects
  projects:
    - project: Blinky.cproject.yml
  compiler: AC6